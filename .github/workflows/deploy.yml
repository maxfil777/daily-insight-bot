
name: Deploy Weather Bot


on:
  push:
    branches: [ main ]
  workflow_dispatch: # Позволяет запускать кнопкой из интерфейса GitHub

jobs:
# 1. Проверка кода (Python Lint)
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9.2' # Укажи свою версию Python


- name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          # Если есть requirements.txt, раскомментируй:
          # pip install -r requirements.txt
          pip install -r requirements.txt

      - name: Run Lint
        run: |
          # Остановит сборку, если есть синтаксические ошибки или неопределенные имена
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Настройки стиля (можно настроить под себя)
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  # 2. Деплой по SSH
  deploy:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        # uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # Переходим в папку проекта
            cd /home/debian/weather_bot
            git pull origin main

            # Подтягиваем свежий код из GitHub
            git pull origin main

            # Активируем venv и обновляем библиотеки
            source venv/bin/activate
            pip install -r requirements.txt
            
            # Перезапускаем сервис, если нужно (например, через systemctl или pm2)            
            sudo systemctl restart weather_bot

